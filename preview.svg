<svg xmlns="http://www.w3.org/2000/svg" width="720" height="214">
  <defs>
    <style>
      @font-face { font-family: 'mono'; src: local('ui-monospace'), local('SF Mono'), local('Cascadia Code'), local('Consolas'), local('monospace'); }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="720" height="214" rx="10" fill="#1e1e2e"/>
  <rect width="720" height="36" rx="10" fill="#313244"/>
  <rect x="0" y="26" width="720" height="10" fill="#1e1e2e"/>
  <circle cx="20" cy="13" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="13" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="13" r="6" fill="#a6e3a1"/>
  <text x="360" y="17" text-anchor="middle" fill="#cdd6f4" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">zsh-predictive-list</text>

  <!-- Prompt: ❯ git c█ -->
  <text x="16" y="62" fill="#cba6f7" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">❯</text>
  <text x="32" y="62" fill="#cdd6f4" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">git c</text>
  <rect x="72" y="49" width="8" height="17" rx="1" fill="#cdd6f4" opacity="0.7"/>

  <!-- Header -->
  <text x="16" y="84" fill="#6c7086" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">[-/4]</text>

  <!-- Item 1 -->
  <text x="32" y="106" fill="#f9e2af" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">git c</text>
  <text x="72" y="106" fill="#6c7086" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">herry-pick 91ab23f</text>

  <!-- Item 2 -->
  <text x="32" y="128" fill="#f9e2af" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">git c</text>
  <text x="72" y="128" fill="#6c7086" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">onfig --global core.editor nvim</text>

  <!-- Item 3 -->
  <text x="32" y="150" fill="#f9e2af" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">git c</text>
  <text x="72" y="150" fill="#6c7086" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">ommit -m "add widget prototype"</text>

  <!-- Item 4 -->
  <text x="32" y="172" fill="#f9e2af" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">git c</text>
  <text x="72" y="172" fill="#6c7086" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">heckout -b feature/predictions</text>
